    <rect x="146" y="626" width="124" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.9"/>
    <text x="176" y="649" fill="#0E3440" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Dine</text>
