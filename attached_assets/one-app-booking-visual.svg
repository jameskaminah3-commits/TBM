  </text>
  <text x="120" y="242" fill="#4D6A72" font-family="Arial, Helvetica, sans-serif" font-size="28">
    into a single concierge-style app journey.
  </text>

  <path d="M510 370C620 350 648 340 706 392" stroke="#6E8E97" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M1092 370C994 352 956 350 894 390" stroke="#6E8E97" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M528 706C620 694 660 670 714 612" stroke="#6E8E97" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>
  <path d="M1076 706C982 696 946 678 886 616" stroke="#6E8E97" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 14"/>

  <g filter="url(#softShadow)">
    <rect x="92" y="254" width="360" height="230" rx="28" fill="#FFFFFF"/>
    <g clip-path="url(#clipStay)">
      <image href="generated_images/Luxury_beachfront_villa_hero_b917e1ae.png" x="92" y="254" width="360" height="230" preserveAspectRatio="xMidYMid slice"/>
    </g>
    <rect x="116" y="276" width="120" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.9"/>
