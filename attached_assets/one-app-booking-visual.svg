    <rect x="1172" y="274" width="136" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.9"/>
    <text x="1202" y="297" fill="#0E3440" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Drive</text>
    <text x="1148" y="526" fill="#0E3440" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Airport Pickup</text>
    <text x="1148" y="560" fill="#5D7981" font-family="Arial, Helvetica, sans-serif" font-size="21">Arrival timing and chauffeur booking are coordinated automatically.</text>
  </g>

