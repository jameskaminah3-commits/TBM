<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="180" y1="120" x2="1410" y2="910" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4E6"/>
      <stop offset="0.45" stop-color="#DDF1F3"/>
      <stop offset="1" stop-color="#F6E7D5"/>
    </linearGradient>
    <linearGradient id="glass" x1="800" y1="110" x2="800" y2="890" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="800" y1="228" x2="800" y2="806" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B3C49"/>
      <stop offset="1" stop-color="#113C48"/>
    </linearGradient>
    <filter id="shadow" x="-80" y="-80" width="1760" height="1160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#11424A" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-40" y="-40" width="1680" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0A3140" flood-opacity="0.16"/>
    </filter>
    <clipPath id="clipStay">
      <rect x="92" y="254" width="360" height="230" rx="28"/>
    </clipPath>
    <clipPath id="clipDrive">
      <rect x="1148" y="252" width="360" height="230" rx="28"/>
    </clipPath>
    <clipPath id="clipChef">
      <rect x="120" y="604" width="380" height="240" rx="28"/>
    </clipPath>
    <clipPath id="clipExperience">
      <rect x="1100" y="606" width="380" height="240" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="210" cy="170" r="220" fill="#FFE1C3" fill-opacity="0.5"/>
  <circle cx="1390" cy="850" r="280" fill="#D8EFF1" fill-opacity="0.7"/>
  <circle cx="1310" cy="170" r="180" fill="#FBE0C9" fill-opacity="0.45"/>

  <g filter="url(#shadow)">
