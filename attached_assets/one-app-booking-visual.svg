    <rect x="1126" y="628" width="166" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.9"/>
    <text x="1157" y="651" fill="#0E3440" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Experience</text>
    <text x="1100" y="888" fill="#0E3440" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="700">Reef Adventure</text>
    <text x="1100" y="922" fill="#5D7981" font-family="Arial, Helvetica, sans-serif" font-size="21">Activities can be added without leaving the trip flow.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="220" width="248" height="500" rx="42" fill="#11161A"/>
    <rect x="690" y="236" width="220" height="468" rx="34" fill="url(#phoneGrad)"/>
    <rect x="764" y="248" width="72" height="8" rx="4" fill="#D9E6E8" fill-opacity="0.65"/>

    <rect x="708" y="274" width="184" height="72" rx="24" fill="#FFFFFF" fill-opacity="0.14"/>
    <text x="728" y="305" fill="#CBE8E6" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Tembea Bila Matata</text>
    <text x="728" y="332" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">Trip Overview</text>

    <rect x="708" y="364" width="184" height="112" rx="24" fill="#FFFFFF"/>
    <text x="726" y="396" fill="#70848A" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">Stay</text>
    <text x="726" y="428" fill="#0F3540" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700">Ocean Villa Suite</text>
    <text x="726" y="454" fill="#5E7881" font-family="Arial, Helvetica, sans-serif" font-size="15">2 nights • Check-in 14 Apr</text>

    <rect x="722" y="494" width="156" height="46" rx="16" fill="#E8F4F2"/>
    <text x="740" y="523" fill="#0E5D63" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Services Added</text>

    <circle cx="728" cy="572" r="8" fill="#42B5A4"/>
    <text x="746" y="578" fill="#F5FCFC" font-family="Arial, Helvetica, sans-serif" font-size="17">Airport chauffeur</text>
    <circle cx="728" cy="610" r="8" fill="#42B5A4"/>
    <text x="746" y="616" fill="#F5FCFC" font-family="Arial, Helvetica, sans-serif" font-size="17">Private chef dinner</text>
    <circle cx="728" cy="648" r="8" fill="#42B5A4"/>
    <text x="746" y="654" fill="#F5FCFC" font-family="Arial, Helvetica, sans-serif" font-size="17">Snorkeling experience</text>

    <rect x="708" y="670" width="184" height="64" rx="22" fill="#F6C18B"/>
    <text x="751" y="710" fill="#5D3511" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Booked in one app</text>
  </g>

  <rect x="566" y="778" width="468" height="110" rx="28" fill="#0F3540"/>
  <text x="600" y="826" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700">
